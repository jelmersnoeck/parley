name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install swiftly
        run: |
          brew install swiftly
          swiftly install latest

      - name: Build
        run: swiftly run swift build

      - name: Test
        run: swiftly run swift test
